<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LVO Holdings</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background-color: #050505; color: #e0e0e0; font-family: 'Cinzel', serif; overflow-x: hidden; }
        .video-background { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: -1; opacity: 0.35; }
        .content-wrapper { display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; padding: 2rem; text-align: center; z-index: 1; position: relative; }
        .hero-logo { width: 100%; max-width: 320px; filter: drop-shadow(0 0 20px rgba(139, 0, 0, 0.4)); margin-bottom: 2.5rem; }
        .mission-statement { font-size: 1.1rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 3.5rem; opacity: 0.85; line-height: 1.8; }
        .pillars-container { display: flex; flex-direction: row; gap: 3rem; margin-bottom: 4rem; }
        .pillar { font-size: 0.95rem; letter-spacing: 3px; text-transform: uppercase; position: relative; padding-bottom: 0.5rem; }
        .pillar::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 40%; height: 1px; background-color: #8b0000; transition: width 0.4s ease; }
        .pillar:hover::after { width: 100%; }
        .action-link { display: inline-block; padding: 1rem 2.5rem; border: 1px solid #8b0000; color: #e0e0e0; text-decoration: none; text-transform: uppercase; letter-spacing: 3px; font-size: 0.85rem; background: rgba(139, 0, 0, 0.05); transition: all 0.4s ease; backdrop-filter: blur(4px); }
        .action-link:hover { background: rgba(139, 0, 0, 0.8); color: #fff; border-color: #ff1a1a; box-shadow: 0 0 15px rgba(139, 0, 0, 0.5); }
        @media (max-width: 768px) {
            .content-wrapper { padding: 1.5rem; justify-content: center; min-height: 100dvh; }
            .hero-logo { max-width: 220px; margin-bottom: 2rem; }
            .mission-statement { font-size: 0.9rem; margin-bottom: 2.5rem; }
            .pillars-container { flex-direction: column; gap: 2rem; margin-bottom: 3rem; }
            .pillar { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <video class="video-background" autoplay loop muted playsinline>
        <source src="assets/0410__1_.mov">
    </video>
    <main class="content-wrapper">
        <img src="assets/logo.png" alt="LVO Holdings Mark" class="hero-logo">
        <h2 class="mission-statement">We do not advertise.<br>We do not explain.<br>We build.</h2>
        <div class="pillars-container">
            <div class="pillar">Vanguard</div>
            <div class="pillar">Operations</div>
            <div class="pillar">Alliance</div>
        </div>
        <a href="https://contact.wearelvo.com" class="action-link">Access Hub</a>
    </main>
</body>
</html>
